name: Build for aarch64-apple-ios

on:
  push:
    branches:
      - main  # 当推送到 main 分支时触发
  pull_request:
    branches:
      - main  # 当向 main 分支提交 PR 时触发

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '14.3.1'  # 使用可用的 Xcode 版本

    - name: Install dependencies
      run: |
        brew install automake autoconf libtool  # 根据需要安装依赖
        sudo gem install cocoapods             # 安装 CocoaPods
    
    - name: Install CocoaPods dependencies
      run: pod install  # 运行 pod install 安装依赖

    - name: Build for aarch64-apple-ios
      run: xcodebuild -workspace YourProject.xcworkspace -scheme YourScheme -sdk iphoneos -arch arm64 clean build
      env:
        DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}  # 你的开发团队ID
        CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}  # 代码签名身份
        PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}  # 配置描述文件

    - name: Upload build artifacts
      uses: actions/upload-artifact@v2
      with:
        name: build-artifacts
        path: build/Release-iphoneos/  # 上传构建产物